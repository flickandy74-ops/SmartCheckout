<section class="ai-insights" *ngIf="insights">
  <h3>AI Insights</h3>
  <p class="smart-insight">{{ smartInsightLine }}</p>

  <div class="insight-row">
    <span class="insight-chip insight-savings" *ngIf="chips.savings">
      💰 {{ chips.savings }}
    </span>
    <span class="insight-chip">💳 {{ chips.payment }}</span>
    <span class="insight-chip">🚚 {{ chips.delivery }}</span>
    <span class="insight-chip">🧠 {{ chips.score }}</span>
  </div>

  <div class="score-bar">
    <div class="score-fill" [style.width.%]="insights.aiScore"></div>
  </div>
</section>
